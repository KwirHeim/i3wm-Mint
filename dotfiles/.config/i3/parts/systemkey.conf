bindsym XF86AudioRaiseVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ +2%
bindsym XF86AudioLowerVolume exec --no-startup-id pactl set-sink-volume @DEFAULT_SINK@ -2%
bindsym XF86AudioMute exec --no-startup-id pactl set-sink-mute @DEFAULT_SINK@ toggle
#bindsym XF86MicMute exec --no-startup-id pactl set-source-mute @DEFAULT_SINK@ toggle

bindsym XF86MonBrightnessUp exec --no-startup-id brightnessctl set +2%
bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl set 2%-

bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioPrev exec playerctl previous
bindsym XF86AudioNext exec playerctl next

bindsym Shift+XF86AudioPrev exec playerctl position 5-
bindsym Shift+XF86AudioNext exec playerctl position 5+

